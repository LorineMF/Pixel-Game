<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinthe</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- Zone dans laquelle labInit() injecte le canvas #lab-canvas -->
<div id="canvas"></div>

<!-- Zone dans laquelle labUpdateUI() injecte le niveau et les boutons -->
<div id="lab-ui" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;"></div>

<a id="back-btn" href="./index.html">← MENU</a>

<div id="toast"></div>

<script src="./labyrinthe.js"></script>
<script>
  // Lance le labyrinthe dès que le DOM est prêt.
  window.addEventListener('DOMContentLoaded', function(){ labInit(); });
</script>
</body>
</html>
